<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>丹东特检</title>
  <style>
    :root {
      --bg: #f3f3f3;
      --line: #d8d8d8;
      --text: #1f2f3d;
      --brand: #19b5c7;
      --card-bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      padding: 14px 8px 24px;
    }

    .phone-page {
      width: min(100%, 690px);
    }

    .brand-title {
      margin: 0 0 10px;
      text-align: center;
      color: var(--brand);
      font-size: 60px;
      line-height: 1.15;
      font-weight: 450;
      letter-spacing: 0;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.01);
    }

    .card-header {
      margin: 0;
      height: 82px;
      line-height: 82px;
      border-bottom: 1px solid var(--line);
      text-align: center;
      font-weight: 400;
      font-size: 20px;
      color: #263645;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 18px;
    }

    td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      height: 84px;
      padding: 0 12px;
      color: #273949;
      word-break: break-word;
    }

    tr td:last-child {
      border-right: none;
    }

    .label {
      width: 39%;
      text-align: right;
      font-weight: 400;
      white-space: nowrap;
    }

    .value {
      width: 61%;
      text-align: left;
      padding-left: 4px;
      font-weight: 400;
      letter-spacing: 0;
    }

    @media (max-width: 430px) {
      .brand-title {
        font-size: 24px;
      }

      .card-header {
        font-size: 20px;
        height: 52px;
        line-height: 52px;
      }

      table {
        font-size: 15px;
      }

      td {
        height: 58px;
        padding: 0 8px;
      }
    }
  </style>
</head>
<body>
  <main class="phone-page">
    <h1 class="brand-title">丹东特检</h1>

    <section class="card" aria-label="车瓶信息">
      <h2 class="card-header">车瓶信息</h2>
      <table>
        <tbody>
          <tr>
            <td class="label">登记证编号：</td>
            <td class="value">瓶31辽FE0638（22）</td>
          </tr>
          <tr>
            <td class="label">车牌号：</td>
            <td class="value">辽F5328R</td>
          </tr>
          <tr>
            <td class="label">安装日期：</td>
            <td class="value">2020.7.13</td>
          </tr>
          <tr>
            <td class="label">气瓶种类：</td>
            <td class="value">车用钢瓶</td>
          </tr>
          <tr>
            <td class="label">气瓶编号：</td>
            <td class="value">B4133044</td>
          </tr>
          <tr>
            <td class="label">检验日期：</td>
            <td class="value">2026年04月02日</td>
          </tr>
          <tr>
            <td class="label">下次检验日期：</td>
            <td class="value">2029-04-02</td>
          </tr>
          <tr>
            <td class="label">检验机构：</td>
            <td class="value">丹东市特种设备监督检验所</td>
          </tr>
          <tr>
            <td class="label">联系电话：</td>
            <td class="value">0415-6256933</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
